name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - "better-osm-org.user.js"
      - "src/**"
      - "src/tests/e2e/**"
      - ".github/workflows/e2e-firefox-violentmonkey.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: e2e-firefox-userscript-managers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-firefox-managers:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.manager.allow_failure }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        locale:
          - id: en
            name: English
#          - id: ru
#            name: Russian
        manager:
          - id: violentmonkey
            name: Violentmonkey
            xpi_url: https://addons.mozilla.org/firefox/downloads/latest/violentmonkey/latest.xpi
            allow_failure: false
          - id: tampermonkey
            name: Tampermonkey
            xpi_url: https://addons.mozilla.org/firefox/downloads/latest/tampermonkey/latest.xpi
            allow_failure: false
          - id: firemonkey
            name: Firemonkey
            xpi_url: https://addons.mozilla.org/firefox/downloads/latest/firemonkey/latest.xpi
            allow_failure: true

    name: Firefox + ${{ matrix.manager.name }} + ${{ matrix.locale.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download userscript manager add-on
        run: |
          mkdir -p src/tests/e2e/artifacts
          chmod 0777 src/tests/e2e/artifacts
          curl -fL "${{ matrix.manager.xpi_url }}" -o src/tests/e2e/artifacts/manager.xpi
          ls -lh src/tests/e2e/artifacts/manager.xpi

      - name: Run E2E in Docker
        env:
          E2E_LOCALE: ${{ matrix.locale.id }}
          E2E_SCRIPT_MANAGER_NAME: ${{ matrix.manager.name }}
          E2E_SCRIPT_MANAGER_XPI: /workspace/src/tests/e2e/artifacts/manager.xpi
        run: |
          mkdir -p src/tests/e2e/artifacts
          COMPOSE_UP_LOG="src/tests/e2e/artifacts/compose-up.log"

          echo "::group::Docker Compose (compact mode)"
          set +e
          docker compose -f src/tests/e2e/docker-compose.yml up \
            --build \
            --quiet-build \
            --abort-on-container-exit \
            --exit-code-from e2e-firefox \
            > "${COMPOSE_UP_LOG}" 2>&1
          E2E_EXIT_CODE=$?
          set -e
          echo "::endgroup::"

          echo "Compose output saved to ${COMPOSE_UP_LOG}"
          echo "Key E2E lines (including script manager install):"
          grep -E "\\[test:|Using manager package|Installing .* addon|Opening userscript URL|Searching install confirmation UI|Clicked install candidate|PASS:|FAIL:|E2E finished|Copied artifact|Error:" "${COMPOSE_UP_LOG}" | tail -n 120 || true
          if [ "${E2E_EXIT_CODE}" -ne 0 ]; then
            echo "Docker compose failed, showing last 250 lines from ${COMPOSE_UP_LOG}:"
            tail -n 250 "${COMPOSE_UP_LOG}" || true
          fi

          CONTAINER_ID="$(docker compose -f src/tests/e2e/docker-compose.yml ps -aq e2e-firefox | head -n 1)"
          if [ -n "${CONTAINER_ID}" ]; then
            docker cp "${CONTAINER_ID}:/tmp/workspace/src/tests/e2e/artifacts/." src/tests/e2e/artifacts/ 2>/dev/null || true
            docker logs "${CONTAINER_ID}" > src/tests/e2e/artifacts/container.log 2>&1 || true
          fi
          docker compose -f src/tests/e2e/docker-compose.yml logs --no-color > src/tests/e2e/artifacts/docker-compose.log 2>&1 || true

          exit "${E2E_EXIT_CODE}"

      - name: Collect artifacts from container
        if: always()
        run: |
          mkdir -p src/tests/e2e/artifacts
          CONTAINER_ID="$(docker compose -f src/tests/e2e/docker-compose.yml ps -q e2e-firefox)"
          if [ -n "${CONTAINER_ID}" ]; then
            docker cp "${CONTAINER_ID}:/tmp/workspace/src/tests/e2e/artifacts/." src/tests/e2e/artifacts/ 2>/dev/null || true
          fi

      - name: List local artifact files
        if: always()
        run: |
          ls -lah src/tests/e2e/artifacts || true

      - name: Upload E2E debug artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-firefox-${{ matrix.manager.id }}-${{ matrix.locale.id }}-artifacts
          path: |
            src/tests/e2e/artifacts/**
          if-no-files-found: warn
